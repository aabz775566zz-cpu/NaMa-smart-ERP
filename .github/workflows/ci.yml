name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel a stale in-progress run when new commits land on the same branch/PR.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'

jobs:
  # Typecheck, build, and the web unit-test suite — none of these touch a
  # database, so they run without a Postgres service for speed.
  checks:
    name: Typecheck, build, web tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Every workspace's "lint" script is `tsc --noEmit` (see each
      # package.json) — turbo runs it across the whole monorepo in
      # dependency order, so this is the real typecheck gate, not a stylistic
      # linter (the project has none yet).
      - name: Generate Prisma client
        run: npm run db:generate

      - name: Typecheck (turbo run lint)
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Web unit tests
        run: npm run test -w @erp-smart/web

  # The API's test suite is a real e2e suite against a bootstrapped Nest app
  # + a dedicated Postgres database (see apps/api/jest.config.ts) — no unit
  # layer exists yet, so this is the only automated coverage of business
  # logic (tenant isolation, permissions, the sales->invoice->stock flow).
  api-e2e:
    name: API e2e tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          # Matches apps/api/.env.test's DATABASE_URL exactly — that file is
          # committed (it holds no real secret) and is the single source of
          # truth this job's Postgres service must line up with.
          POSTGRES_USER: erp_smart
          POSTGRES_PASSWORD: erp_smart_dev
          POSTGRES_DB: erp_smart_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U erp_smart -d erp_smart_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run db:generate

      # Migrations + system-role seeding also run automatically inside Jest's
      # globalSetup (see apps/api/test/global-setup.ts) on every test run —
      # this step only needs to guarantee the database itself exists, which
      # the Postgres service's POSTGRES_DB above already does.
      - name: Run API e2e tests
        working-directory: apps/api
        run: npm test
