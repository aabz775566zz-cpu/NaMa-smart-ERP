services:
  postgres:
    image: postgres:16-alpine
    container_name: erp-smart-postgres
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: erp_smart
      POSTGRES_PASSWORD: erp_smart_dev
      POSTGRES_DB: erp_smart
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U erp_smart -d erp_smart']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
